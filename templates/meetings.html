{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Meetings</h2>
    <a href="{{ url_for('create_meeting') }}" class="btn btn-primary">+ Schedule Meeting</a>
</div>
<div class="row">
    {% for meeting in meetings %}
    <div class="col-md-6 mb-3">
        <div class="card">
            <div class="card-body">
                <h5>{{ meeting.title }}</h5>
                <p><strong>Date:</strong> {{ meeting.date_time.strftime('%Y-%m-%d %H:%M') }}</p>
                {% if meeting.meeting_link %}
                    <p><strong>Link:</strong> <a href="{{ meeting.meeting_link }}" target="_blank">Join Meeting</a></p>
                {% endif %}
                <a href="{{ url_for('view_meeting', id=meeting.id) }}" class="btn btn-sm btn-primary">Details</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
