{% extends "base.html" %}
{% block content %}
<h2>Schedule Meeting</h2>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Title</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Date & Time</label>
                        <input type="datetime-local" name="date_time" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Duration (minutes)</label>
                        <input type="number" name="duration" class="form-control" value="60">
                    </div>
                    <div class="mb-3">
                        <label>Meeting Link (Zoom/Google Meet)</label>
                        <input type="url" name="meeting_link" class="form-control" placeholder="https://...">
                    </div>
                    <div class="mb-3">
                        <label>Location</label>
                        <input type="text" name="location" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Schedule</button>
                    <a href="{{ url_for('view_meetings') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
