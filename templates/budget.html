{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Budgets</h2>
    <a href="{{ url_for('create_budget') }}" class="btn btn-primary">+ Submit Budget</a>
</div>
<div class="card">
    <div class="card-body">
        <table class="table">
            <thead>
                <tr><th>Title</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr>
            </thead>
            <tbody>
                {% for budget in budgets %}
                <tr>
                    <td>{{ budget.title }}</td>
                    <td>${{ "%.2f"|format(budget.amount) }}</td>
                    <td><span class="status-badge status-{{ budget.status }}">{{ budget.status }}</span></td>
                    <td>{{ budget.created_at.strftime('%Y-%m-%d') }}</td>
                    <td><a href="{{ url_for('view_budget', id=budget.id) }}" class="btn btn-sm btn-info">View</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
