{% extends "base.html" %}
{% block content %}
<h2>{{ budget.title }}</h2>
<p><strong>Amount:</strong> ${{ budget.amount }}</p>
<p><strong>Status:</strong> {{ budget.status }}</p>
{% if current_user.role == 'admin' and budget.status == 'pending' %}
<form method="POST" action="{{ url_for('review_budget', id=budget.id) }}">
    <textarea name="comments" class="form-control mb-2" placeholder="Comments"></textarea>
    <button type="submit" name="action" value="approve" class="btn btn-success">Approve</button>
    <button type="submit" name="action" value="reject" class="btn btn-danger">Reject</button>
</form>
{% endif %}
{% endblock %}
